name: Demo telemetry capture

on:
  workflow_dispatch:

jobs:
  demo-telemetry-capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Host inventory
        run: |
          set -euxo pipefail
          date -u +%Y-%m-%dT%H:%M:%SZ
          uname -a
          nproc
          free -h
          df -h
          docker version
          docker compose version

      - name: Clone and configure upstream OpenTelemetry Demo
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/open-telemetry/opentelemetry-demo.git demo
          cd demo
          git rev-parse HEAD
          mkdir -p capture
          chmod 0777 capture
          cat > src/otel-collector/otelcol-config-extras.yml <<'EOF'
          exporters:
            file/traces:
              path: /capture/traces.json
              format: json
              flush_interval: 1s
              create_directory: true
            file/metrics:
              path: /capture/metrics.json
              format: json
              flush_interval: 1s
              create_directory: true
            file/logs:
              path: /capture/logs.json
              format: json
              flush_interval: 1s
              create_directory: true

          service:
            pipelines:
              traces:
                exporters: [debug, otlp_grpc/jaeger, span_metrics, file/traces]
              metrics:
                exporters: [debug, otlp_http/prometheus, file/metrics]
              logs:
                exporters: [debug, opensearch, file/logs]
          EOF
          cat > compose.capture.yaml <<'EOF'
          services:
            otel-collector:
              volumes:
                - ${HOST_FILESYSTEM}:/hostfs:ro
                - ${DOCKER_SOCK}:/var/run/docker.sock:ro
                - ${OTEL_COLLECTOR_CONFIG}:/etc/otelcol-config.yml
                - ${OTEL_COLLECTOR_CONFIG_FULL}:/etc/otelcol-config-full.yml
                - ${OTEL_COLLECTOR_CONFIG_OBSERVABILITY}:/etc/otelcol-config-observability.yml
                - ${OTEL_COLLECTOR_CONFIG_EXTRAS}:/etc/otelcol-config-extras.yml
                - ./capture:/capture:rw
          EOF
          docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            config --services
          sed -n '1,220p' src/otel-collector/otelcol-config-extras.yml
          sed -n '1,120p' compose.capture.yaml

      - name: Pull minimal Demo images
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            pull --ignore-buildable

      - name: Start Demo and capture telemetry files
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            up --force-recreate --remove-orphans --detach
          for attempt in $(seq 1 60); do
            echo "frontend probe attempt ${attempt}"
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              ps
            if curl -fsS -o /tmp/demo_frontend.html http://localhost:8080/; then
              break
            fi
            sleep 5
          done
          test -s /tmp/demo_frontend.html
          wc -c /tmp/demo_frontend.html
          curl -fsS -o /tmp/demo_jaeger.html http://localhost:8080/jaeger/ui/ || true
          wc -c /tmp/demo_jaeger.html || true
          curl -fsS -o /tmp/demo_grafana.html http://localhost:8080/grafana/ || true
          wc -c /tmp/demo_grafana.html || true
          sleep 30
          sync
          ls -lh capture
          wc -c capture/*.json
          test -s capture/traces.json
          test -s capture/metrics.json
          test -s capture/logs.json
          head -c 500 capture/traces.json || true
          printf '\n'
          head -c 500 capture/metrics.json || true
          printf '\n'
          head -c 500 capture/logs.json || true
          printf '\n'

      - name: Collect Compose and resource logs
        if: always()
        run: |
          set +e
          date -u +%Y-%m-%dT%H:%M:%SZ
          free -h
          df -h
          docker system df
          docker stats --no-stream
          if [ -d demo ]; then
            cd demo
            git rev-parse HEAD
            ls -lh capture || true
            wc -c capture/* || true
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              ps -a
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              logs --no-color --tail=120
          fi
          exit 0

      - name: Shut down Demo
        if: always()
        run: |
          set +e
          if [ -d demo ]; then
            cd demo
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              down -v --remove-orphans
            ls -lh capture || true
            wc -c capture/* || true
          fi
          exit 0

      - name: Upload telemetry capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-telemetry-file-exporter-capture
          path: |
            demo/capture/**
            demo/src/otel-collector/otelcol-config-extras.yml
            demo/compose.capture.yaml
          if-no-files-found: warn
          retention-days: 7
