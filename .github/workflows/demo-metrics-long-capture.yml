name: Demo metrics long capture

on:
  workflow_dispatch:

jobs:
  demo-metrics-long-capture:
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    steps:
      - name: Host inventory
        run: |
          set -euxo pipefail
          date -u +%Y-%m-%dT%H:%M:%SZ
          uname -a
          nproc
          free -h
          df -h
          docker version
          docker compose version

      - name: Clone and configure pinned OpenTelemetry Demo
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/open-telemetry/opentelemetry-demo.git demo
          cd demo
          git fetch --depth 1 origin 4baa77b5e0bcb911ed6af53e9a61fc7adadc6140
          git checkout 4baa77b5e0bcb911ed6af53e9a61fc7adadc6140
          git rev-parse HEAD | tee ../demo_commit.txt
          mkdir -p capture
          chmod 0777 capture
          cat > src/otel-collector/otelcol-config-extras.yml <<'EOF'
          exporters:
            file/metrics_proto:
              path: /capture/metrics.pb
              format: proto
              flush_interval: 1s
              create_directory: true
            file/metrics_json:
              path: /capture/metrics.json
              format: json
              flush_interval: 1s
              create_directory: true

          service:
            pipelines:
              traces:
                exporters: [debug, otlp_grpc/jaeger, span_metrics]
              metrics:
                exporters: [debug, otlp_http/prometheus, file/metrics_proto, file/metrics_json]
              logs:
                exporters: [debug, opensearch]
          EOF
          cat > compose.capture.yaml <<'EOF'
          services:
            otel-collector:
              volumes:
                - ${HOST_FILESYSTEM}:/hostfs:ro
                - ${DOCKER_SOCK}:/var/run/docker.sock:ro
                - ${OTEL_COLLECTOR_CONFIG}:/etc/otelcol-config.yml
                - ${OTEL_COLLECTOR_CONFIG_FULL}:/etc/otelcol-config-full.yml
                - ${OTEL_COLLECTOR_CONFIG_OBSERVABILITY}:/etc/otelcol-config-observability.yml
                - ${OTEL_COLLECTOR_CONFIG_EXTRAS}:/etc/otelcol-config-extras.yml
                - ./capture:/capture:rw
          EOF
          docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            config --services
          sed -n '1,220p' src/otel-collector/otelcol-config-extras.yml
          sed -n '1,120p' compose.capture.yaml

      - name: Pull minimal Demo images
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            pull --ignore-buildable

      - name: Start Demo and capture metrics
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.capture.yaml \
            -f compose.extras.yaml \
            up --force-recreate --remove-orphans --detach
          for attempt in $(seq 1 90); do
            echo "frontend probe attempt ${attempt}"
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              ps
            if curl -fsS -o /tmp/demo_frontend.html http://localhost:8080/; then
              break
            fi
            sleep 5
          done
          test -s /tmp/demo_frontend.html
          wc -c /tmp/demo_frontend.html
          date -u +%Y-%m-%dT%H:%M:%SZ | tee ../capture_started_at.txt
          sleep 600
          date -u +%Y-%m-%dT%H:%M:%SZ | tee ../capture_ended_at.txt
          sync
          ls -lh capture
          wc -c capture/* || true
          test -s capture/metrics.pb
          test -s capture/metrics.json
          sha256sum capture/metrics.pb capture/metrics.json | tee ../capture_sha256.txt
          head -c 200 capture/metrics.json || true
          printf '\n'

      - name: Collect Compose and resource logs
        if: always()
        run: |
          set +e
          date -u +%Y-%m-%dT%H:%M:%SZ
          free -h
          df -h
          docker system df
          docker stats --no-stream
          if [ -d demo ]; then
            cd demo
            git rev-parse HEAD
            ls -lh capture || true
            wc -c capture/* || true
            sha256sum capture/* || true
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              ps -a
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              logs --no-color --tail=160
          fi
          exit 0

      - name: Shut down Demo
        if: always()
        run: |
          set +e
          if [ -d demo ]; then
            cd demo
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.capture.yaml \
              -f compose.extras.yaml \
              down -v --remove-orphans
            ls -lh capture || true
            wc -c capture/* || true
          fi
          exit 0

      - name: Upload metrics capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-metrics-long-capture
          path: |
            demo/capture/**
            demo/src/otel-collector/otelcol-config-extras.yml
            demo/compose.capture.yaml
            demo_commit.txt
            capture_started_at.txt
            capture_ended_at.txt
            capture_sha256.txt
          if-no-files-found: warn
          retention-days: 7
