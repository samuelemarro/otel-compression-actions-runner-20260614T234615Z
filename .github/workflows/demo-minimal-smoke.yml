name: Demo minimal smoke

on:
  workflow_dispatch:

jobs:
  demo-minimal-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Host inventory
        run: |
          set -euxo pipefail
          date -u +%Y-%m-%dT%H:%M:%SZ
          uname -a
          nproc
          free -h
          df -h
          docker version
          docker compose version

      - name: Clone upstream OpenTelemetry Demo
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/open-telemetry/opentelemetry-demo.git demo
          cd demo
          git rev-parse HEAD
          git status --short
          docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.extras.yaml \
            config --services

      - name: Pull minimal Demo images
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.extras.yaml \
            pull --ignore-buildable

      - name: Start minimal Demo and probe endpoints
        run: |
          set -euxo pipefail
          cd demo
          time docker compose --env-file .env --env-file .env.override \
            -f compose.yaml \
            -f compose.observability.yaml \
            -f compose.extras.yaml \
            up --force-recreate --remove-orphans --detach
          for attempt in $(seq 1 60); do
            echo "frontend probe attempt ${attempt}"
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.extras.yaml \
              ps
            if curl -fsS -o /tmp/demo_frontend.html http://localhost:8080/; then
              break
            fi
            sleep 5
          done
          test -s /tmp/demo_frontend.html
          wc -c /tmp/demo_frontend.html
          curl -fsS -o /tmp/demo_jaeger.html http://localhost:8080/jaeger/ui/ || true
          wc -c /tmp/demo_jaeger.html || true
          curl -fsS -o /tmp/demo_grafana.html http://localhost:8080/grafana/ || true
          wc -c /tmp/demo_grafana.html || true

      - name: Collect Compose and resource logs
        if: always()
        run: |
          set +e
          date -u +%Y-%m-%dT%H:%M:%SZ
          free -h
          df -h
          docker system df
          docker stats --no-stream
          if [ -d demo ]; then
            cd demo
            git rev-parse HEAD
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.extras.yaml \
              ps -a
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.extras.yaml \
              logs --no-color --tail=250
          fi
          exit 0

      - name: Shut down Demo
        if: always()
        run: |
          set +e
          if [ -d demo ]; then
            cd demo
            docker compose --env-file .env --env-file .env.override \
              -f compose.yaml \
              -f compose.observability.yaml \
              -f compose.extras.yaml \
              down -v --remove-orphans
          fi
          exit 0
